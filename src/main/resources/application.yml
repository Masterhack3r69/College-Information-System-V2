server:
  port: 8080

spring:
  application:
    name: sis
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sis_db}
    username: ${DB_USERNAME:sis_user}
    password: ${DB_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

sis:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  school:
    name: ${SCHOOL_NAME:Student Information System}
    address: ${SCHOOL_ADDRESS:}
    contact: ${SCHOOL_CONTACT:}
    logo-path: ${SCHOOL_LOGO_PATH:}
  jwt:
    secret: ${JWT_SECRET:change_me_change_me_change_me_change_me_change_me_change_me}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}
  storage:
    document-root: ${DOCUMENT_ROOT:uploads/documents}
